<h1>
    {% if ucitel %}Editace učitele{% else %}Nový učitel{% endif %}
</h1>

<form method="post"
      action="{% if ucitel %}/teachers/{{ ucitel.id }}{% else %}/teachers{% endif %}">

    <label>Příjmení:</label>
    <input type="text" name="prijmeni"
           value="{{ ucitel.prijmeni if ucitel else '' }}" required>

    <br><br>

    <button type="submit">Uložit</button>
</form>

<a href="/view/teachers">
    <button>Zrušit</button>
</a>
